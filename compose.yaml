services:
  worktodo:
    build:
      context: .
      args:
        VITE_COPYRIGHT_NOTICE: ${VITE_COPYRIGHT_NOTICE:-Copyright © 2026 AlisterTT · MIT License}
    container_name: worktodo
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - worktodo_data:/app/data

volumes:
  worktodo_data:
